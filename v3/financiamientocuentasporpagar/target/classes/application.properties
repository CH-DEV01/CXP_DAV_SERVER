# URL base del API interno al que se hace proxy
proxy.target.base=https://sv4148lap.daviviendasv.com:8443/APIFinanciamientoEmpresas

# Timeouts del RestTemplate (milisegundos)
proxy.http.connect-timeout=5000
proxy.http.read-timeout=30000

# Pool de conexiones HTTP
proxy.http.pool.max-total=100
proxy.http.pool.max-per-route=50

# Cookie de sesión segura (OWASP — sección 8.4)
server.servlet.session.cookie.name=token
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict
server.servlet.session.timeout=30m

# Deshabilitar URL rewriting — el jsessionid NUNCA debe aparecer en la URL (OWASP A02)
server.servlet.session.tracking-modes=cookie

# Necesario cuando hay un proxy/balanceador (F5) adelante en producción
server.forward-headers-strategy=native

# Logging
logging.config=classpath:logback-spring.xml
