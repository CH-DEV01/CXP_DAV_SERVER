<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>Financiamiento — Cuentas por Pagar</title>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 80px; background: #f1f5f9; }
    .box { background: #fff; border-radius: 12px; padding: 32px 36px; box-shadow: 0 4px 16px rgba(0,0,0,.1); max-width: 480px; width: 100%; }
    h2   { color: #1d3461; margin-bottom: 8px; }
    .token { font-family: monospace; font-size: .82rem; background: #f1f5f9; padding: 8px 12px; border-radius: 8px; word-break: break-all; margin-top: 12px; color: #0a7c4c; }
    .error { color: #C8102E; margin-top: 12px; font-size: .85rem; }
  </style>
</head>
<body>
  <div class="box">
    <h2 id="titulo">Cargando sesión...</h2>
    <div id="contenido"></div>
  </div>

  <script>
    // Consulta al backend el nuevo session token generado por Spring
    fetch('/api/session-info')
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (data.autenticado) {
          document.getElementById('titulo').textContent = 'Bienvenido';
          document.getElementById('contenido').innerHTML =
            '<p>Sesión SSO activa. Nuevo session token generado por la aplicación:</p>' +
            '<div class="token">' + data.nuevoSessionToken + '</div>';
        } else {
          document.getElementById('titulo').textContent = 'Acceso denegado';
          document.getElementById('contenido').innerHTML =
            '<p class="error">No hay sesión activa. Regresa a Pay Davivienda e inicia el flujo SSO.</p>';
        }
      })
      .catch(function() {
        document.getElementById('titulo').textContent = 'Error';
        document.getElementById('contenido').innerHTML =
          '<p class="error">No se pudo conectar con el servidor.</p>';
      });
  </script>
</body>
</html>
