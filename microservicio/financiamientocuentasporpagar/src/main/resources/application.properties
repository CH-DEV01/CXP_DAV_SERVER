# Puerto — debe coincidir con el action del form POST en indexSimuladorSessionTokenPay.html
server.port=8181

# Cookie de sesión segura (OWASP — sección 8.4)
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=strict
server.servlet.session.timeout=30m

# Deshabilitar URL rewriting — el jsessionid NUNCA debe aparecer en la URL (OWASP A02)
server.servlet.session.tracking-modes=cookie

# Necesario cuando hay un proxy/balanceador (F5) adelante en producción
server.forward-headers-strategy=native
